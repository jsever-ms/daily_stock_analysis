name: 股票深度分析任务

on:
  # 允许手动触发并接收参数
  workflow_dispatch:
    inputs:
      stock_code:
        description: '股票代码 (必填)'
        required: true
        default: '000001'
      cost_price:
        description: '买入成本 (可选，用于私人分析)'
        required: false
        default: '0'
      position_ratio:
        description: '持仓比例 (可选，用于风险评估)'
        required: false
        default: '0'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 执行股票分析
        env:
          # 确保这些 Secret 已经在 GitHub 仓库的 Settings -> Secrets 中配好
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GHP_TOKEN: ${{ secrets.GHP_TOKEN }}
          SILICON_FLOW_KEY: ${{ secrets.SILICON_FLOW_KEY }}
          TZ: Asia/Shanghai
        run: |
          # 💡 关键点：将传入的参数准确传给 main.py
          python main.py \
            --stocks "${{ github.event.inputs.stock_code }}" \
            --cost-price "${{ github.event.inputs.cost_price }}" \
            --position-ratio "${{ github.event.inputs.position_ratio }}" \
            --force-run \
            --single-notify
