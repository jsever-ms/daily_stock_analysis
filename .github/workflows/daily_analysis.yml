name: 股票深度分析任务

on:
  workflow_dispatch:
    inputs:
      stock_code:
        description: '股票代码'
        required: true
      cost_price:
        description: '买入成本'
        required: false
        default: '0'
      position_ratio:
        description: '持仓比例'
        required: false
        default: '0'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          # 💡 如果你在 analyzer.py 里用了 pytz，确保安装它
          pip install pytz 

      - name: 执行股票分析
        env:
          # 💡 这里是关键，把所有 AI 的“饭票”都传进去
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SILICON_FLOW_KEY: ${{ secrets.SILICON_FLOW_KEY }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TZ: Asia/Shanghai
        run: |
          python main.py \
            --stocks "${{ github.event.inputs.stock_code }}" \
            --cost-price "${{ github.event.inputs.cost_price }}" \
            --position-ratio "${{ github.event.inputs.position_ratio }}" \
            --force-run \
            --single-notify
