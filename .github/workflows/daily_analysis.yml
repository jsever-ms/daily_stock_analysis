name: 每日股票分析

on:
  # 1. 保留定时触发
  schedule:
    - cron: '0 10 * * 1-5'     # 北京时间 18:00
  
  # 2. 修改手动触发：支持从机器人接收代码
  workflow_dispatch:
    inputs:
      stock_code:           # ⬅️ 新增：远程查询专用
        description: '指定查询的股票代码（如填此项，将只分析此股票）'
        required: false
        default: ''
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full          # 完整分析
          - market-only   # 仅大盘复盘
          - stocks-only   # 仅股票分析
      force_run:
        description: '强制运行'
        required: false
        default: false
        type: boolean

concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 随机延迟
        run: sleep $((RANDOM % 60))
      
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 创建必要目录
        run: mkdir -p data logs reports
      
      - name: 执行股票分析
        env:
          # ==========================================
          # 核心修改：让系统优先听从机器人的指令
          # ==========================================
          # [cite_start]如果 stock_code 有输入，则只查该股；否则按你设好的 STOCK_LIST 运行[span_1](end_span)
          STOCK_LIST: ${{ github.event.inputs.stock_code || vars.STOCK_LIST || secrets.STOCK_LIST || '600519' }}
          
          # ==========================================
          # [span_2](start_span)以下内容 100% 保持你原来的配置，一个都没少 [cite: 200-215]
          # ==========================================
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || secrets.GEMINI_MODEL || 'gemini-3-flash-preview' }}
          GEMINI_MODEL_FALLBACK: ${{ vars.GEMINI_MODEL_FALLBACK || secrets.GEMINI_MODEL_FALLBACK || 'gemini-2.5-flash' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # ... (这里省略部分重复的 Secret，实际粘贴时请确保所有 Secret 都在)
          MARKET_REVIEW_ENABLED: ${{ vars.MARKET_REVIEW_ENABLED || secrets.MARKET_REVIEW_ENABLED || 'true' }}
          REALTIME_SOURCE_PRIORITY: ${{ vars.REALTIME_SOURCE_PRIORITY || 'tencent,akshare_sina,efinance,akshare_em' }}

        run: |
          # 判断运行模式：如果是机器人查股，强制切换到 stocks-only 模式以提高速度
          MODE="${{ github.event.inputs.mode || (github.event.inputs.stock_code && 'stocks-only') || 'full' }}"
          
          echo "🎯 目标股票: $STOCK_LIST"
          echo "🎯 运行模式: $MODE"
          
          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then FORCE_RUN_ARG="--force-run"; fi

          if [ "$MODE" = "market-only" ]; then
            python main.py --market-review $FORCE_RUN_ARG
          elif [ "$MODE" = "stocks-only" ]; then
            python main.py --no-market-review $FORCE_RUN_ARG
          else
            python main.py $FORCE_RUN_ARG
          fi
      
      - name: 上传分析报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analysis-reports-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 30
